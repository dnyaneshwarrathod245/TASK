<!DOCTYPE html>
<html>
<head>
    <title>3 Boxes with Images</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .box {
            width: 150px;
            height: 200px;
            border: 2px solid red;
            margin: 10px;
            display: inline-block;
            padding: 10px;
        }
        *

        img {
            width: 100%;
            height: 100px;
        }

        p {
            font-size: 16px;
            font-weight: bold;
        }
    </style>

</head>
<body>
    <h1>Model box</h1>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131">
        <p>Cat</p>
    </div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d">
        <p>Nature</p>
    </div>

    <div class="box">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
        <p>Mountain</p>
    </div>

</body>
</html>
