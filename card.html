<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>
    <style>
        body{
            background:#a8d8e8;
            font-family: Arial, sans-serif;
        }

        .card{
            width:800px;
            height:450px;
            background:#d9edf5;
            margin:30px auto;
            border-radius:20px;
            position:relative;
            overflow:hidden;
            padding:30px;
            box-sizing:border-box;
        }

        .circle{
            position:absolute;
            top:-80px;
            right:-80px;
            width:250px;
            height:250px;
            background:#6d8fe8;
            border-radius:50%;
        }

        .circle2{
            position:absolute;
            top:130px;
            right:-50px;
            width:120px;
            height:120px;
            background:white;
            border-radius:50%;
        }

        .profile{
            display:flex;
            align-items:flex-start;
            margin-top:40px;
        }

        .profile img{
            width:140px;
            height:140px;
            border-radius:50%;
            border:8px solid #f2f2f2;
            object-fit:cover;
        }

        .info{
            margin-left:30px;
        }

        .info h1{
            margin:0;
            font-size:48px;
        }

        .username{
            font-size:28px;
            font-weight:bold;
            color:#333;
            margin-top:5px;
        }

        .desc{
            margin-top:25px;
            font-size:22px;
            color:#444;
            line-height:1.5;
        }

        .stats{
            display:flex;
            gap:70px;
            margin-top:35px;
        }

        .stat h2{
            margin:0;
            font-size:40px;
        }

        .stat p{
            margin:5px 0 0;
            font-size:20px;
            font-weight:bold;
        }

        .buttons{
            margin-top:40px;
        }

        .btn{
            padding:18px 40px;
            font-size:22px;
            border-radius:10px;
            cursor:pointer;
            margin-right:15px;
        }

        .follow{
            background:#111;
            color:white;
            border:none;
        }

        .view{
            background:transparent;
            border:2px solid #555;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="circle"></div>
    <div class="circle2"></div>

    <div class="profile">
        <img src="cyber2.jpg" alt="Profile">

        <div class="info">
            <h1>Cyber.45</h1>
            <div class="username">@DEVIL.exe</div>

            <div class="desc">
                I'm a Front End Developer, follow me to be the
                first who see my new work.
            </div>

            <div class="stats">
                <div class="stat">
                    <h2>25K</h2>
                    <p>Views</p>
                </div>

                <div class="stat">
                    <h2>82</h2>
                    <p>Projects</p>
                </div>

                <div class="stat">
                    <h2>5.3M</h2>
                    <p>Followers</p>
                </div>
            </div>

            <div class="buttons">
                <button class="btn follow">Follow</button>
                <button class="btn view">View Profile</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
