<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flipkart Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f1f3f6;
        }

        .container {
            width: 800px;
            height: 450px;
            margin: 60px auto;
            display: flex;
            background: white;
        }

        .left {
            width: 40%;
            background-color: #2874f0;
            color: white;
            padding: 40px;
        }

        .left h1 {
            margin: 0;
            font-size: 28px;
        }

        .left p {
            margin-top: 20px;
        }

        .right {
            width: 60%;
            padding: 40px;
            position: relative;
        }

        .right input {
            width: 100%;
            border: none;
            border-bottom: 2px solid #2874f0;
            padding: 10px;
            outline: none;
        }

        .terms {
            font-size: 12px;
            color: gray;
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #fb641b;
            border: none;
            color: white;
        }

        .signup {
            position: absolute;
            bottom: 20px;
            width: 80%;
            text-align: center;
        }

        .signup a {
            color: #2874f0;
            text-decoration: none;
        }
    </style>

</head>

<body>

<div class="container">

    <div class="left">
        <h1>Login</h1>
        <p>Get access to your Orders,<br>Wishlist and Recommendations</p>
    </div>

    <div class="right">
        <input type="text" placeholder="Enter Email/Mobile number">

        <p class="terms">
            By continuing, you agree to Flipkart's Terms of Use and Privacy Policy.
        </p>

        <button>Request OTP</button>

        <p class="signup">
            New to Flipkart? <a href="#">Create an account</a>
        </p>
    </div>

</div>

</body>
</html>
