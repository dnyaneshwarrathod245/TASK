<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body{
            background-image: url(./netlix\ bg.jpg);
        }
        .main{
            height: 100vh;
            background:url('https://assets.nflxext.com/ffe/siteui/vlv3/9b1c3f7e-3c2e-4b4f-9e2e-8b4d3e4c7e1c/7b0b8f1b-hero-bg.jpg') no-repeat center center/cover;
            position: relative;
        }
        .main::after{
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:rgba(0,0,0,0.7); 

        }
        .nav{
            display: flex;
            justify-content: space-between;
            padding: 20px 50px;
            position: relative;
            z-index: 2;


        }
        .logo{
            color: red;
            font-size: 30px;
            font-weight: bold;
        }
        .nav-right{
            display: flex;
            gap: 10px;
        }
        .btn{
            padding: 6px 12px;
            border: none;
            cursor: pointer;
        }
        .lang{
            background: transparent;
            color: white;
            border: 1px solid white;
        }
        

        .signin{
            background: red;
            color: white;

        }
        .content{
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .content h1{
            font-size: 50px;
            font-weight: bold;
        }
        .content h3{
            margin-top: 10px;
        }
        .content p{
            margin-top:  15px;
        }
        .email-box{
            margin-top: 20px;

        }
        .email-box input{
            padding: 10px;
            width: 250px;
            border: none;
            outline: none;
            
        }
        .email-box button{
            padding: 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            
        }
    </style>
</head>
<body>
    <div class="main">


    <div class="nav">
    <div class="logo">NETFLIX</div>
    <div class="nav-right"> 
         <button class="btn lang">English</button>
        <button class="btn signin">Sign in</button>
        </div>
    </div>

        
     <div class="content">
    <h1> Unlimited movies,<br> Shows And more</h1>
    <h3>Starts At ₹149.Cancel Anytime.</h3>
    <p>Ready to watch? Enter your email to create or restart your membership.</p>
    

    <div class="email-box">
            <input type="text" placeholder="Email address">
            <button>Get Started</button>
        </div>
    </div>
 </div>
    
</body>
</html>
