<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSTAGRAM LOGO</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin:auto;
        }
        .insta{          
            width: 200px;
            height:200px;
            border-radius: 40px;
            background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf, #4f5bd5);
            display: flex;
            justify-content:center;
            align-items: center;
            position: relative;
        

        }
        .camera{
            width: 110px;
            height: 110px; 
            border: 6px solid white;
            border-radius: 30px;
            position: relative;            
            
        }
        .lens{
            width: 50px;
            height: 50px;
            border: 6px solid white;    
            border-radius: 50%;
            position: absolute;
            top: 25px;
            left: 25px;

        }
        .flash{
            width: 12px;
            height: 12px;
            background: white;    
            border-radius: 50%;
            position: absolute;
            top: 15px;
            right: 15px;


        }
        
    </style>
</head>
<body>
   <div class="insta">
    <div class="camera">
        <div class="lens"></div>
        <div class="flash"></div>
    </div>
</div>
</body>
</html>
