<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Todo App</title>

<!-- App Icon -->
<link rel="icon" href="icon.png">

<style>
:root {
    --bg: linear-gradient(135deg,#667eea,#764ba2);
    --card: rgba(255,255,255,0.1);
    --text: white;
}

.dark {
    --bg: #1e1e2f;
    --card: #2c2c3a;
    --text: #eee;
}

body {
    margin:0;
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app {
    width:420px;
    padding:20px;
    background: var(--card);
    border-radius:12px;
}

h2 { text-align:center; }

input, select {
    padding:8px;
    border-radius:6px;
    border:none;
    margin:5px 0;
    width:100%;
}

button {
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:5px;
}

.add-btn { background: teal; color:white; }

ul {
    list-style:none;
    padding:0;
    max-height:200px;
    overflow-y:auto;
}

li {
    padding:10px;
    margin-top:8px;
    background: rgba(255,255,255,0.2);
    border-radius:8px;
    position:relative;
}

.completed {
    text-decoration: line-through;
    opacity:0.6;
}

.high { border-left:5px solid red; }
.medium { border-left:5px solid orange; }
.low { border-left:5px solid green; }

.pin {
    position:absolute;
    top:5px;
    right:35px;
    cursor:pointer;
}

.delete {
    position:absolute;
    top:5px;
    right:5px;
    cursor:pointer;
}

.top-bar {
    display:flex;
    justify-content:space-between;
}

.stats {
    font-size:12px;
    margin-top:10px;
}

.progress-bar {
    background:#ccc;
    height:10px;
    border-radius:5px;
    margin-top:10px;
}

.progress {
    height:10px;
    background:lime;
    width:0%;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="app">

<div class="top-bar">
<h2>🚀 Todo</h2>
<button onclick="toggleTheme()">🌙</button>
</div>

<input type="text" id="taskInput" placeholder="Task..." onkeypress="handleEnter(event)">
<input type="datetime-local" id="dueDate">

<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button class="add-btn" onclick="addTask()">Add Task</button>

<input type="text" id="search" placeholder="Search..." oninput="renderTasks()">

<ul id="list"></ul>

<div class="progress-bar">
<div id="progress" class="progress"></div>
</div>

<div class="stats" id="stats"></div>

<button onclick="exportTasks()">📤 Export</button>
<input type="file" onchange="importTasks(event)">

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){
    let text = taskInput.value.trim();
    if(!text) return;

    tasks.push({
        text,
        done:false,
        due: dueDate.value,
        priority: priority.value,
        pinned:false
    });

    document.getElementById("sound").play();

    taskInput.value="";
    dueDate.value="";
    save();
    renderTasks();
}

function renderTasks(){
    let list = document.getElementById("list");
    let search = document.getElementById("search").value.toLowerCase();

    list.innerHTML="";

    // Sort: pinned first, then date
    tasks.sort((a,b)=>{
        if(b.pinned !== a.pinned) return b.pinned - a.pinned;
        return new Date(a.due) - new Date(b.due);
    });

    let completed=0;

    tasks.forEach((t,i)=>{
        if(!t.text.toLowerCase().includes(search)) return;

        let li = document.createElement("li");
        li.className = t.priority;

        if(t.done){
            li.classList.add("completed");
            completed++;
        }

        li.innerHTML = `
            <b>${t.text}</b><br>
            ⏰ ${t.due || "No date"}<br>
            🔥 ${t.priority}
        `;

        li.onclick = ()=>{
            t.done = !t.done;
            save();
            renderTasks();
        };

        // PIN
        let pin = document.createElement("span");
        pin.innerText = t.pinned ? "📌" : "📍";
        pin.className="pin";
        pin.onclick = (e)=>{
            e.stopPropagation();
            t.pinned = !t.pinned;
            save();
            renderTasks();
        };

        // DELETE
        let del = document.createElement("span");
        del.innerText="❌";
        del.className="delete";
        del.onclick=(e)=>{
            e.stopPropagation();
            tasks.splice(i,1);
            save();
            renderTasks();
        };

        li.appendChild(pin);
        li.appendChild(del);
        list.appendChild(li);
    });

    // Stats
    document.getElementById("stats").innerText =
    `Total: ${tasks.length} | Completed: ${completed} | Pending: ${tasks.length-completed}`;

    // Progress
    let percent = (completed / tasks.length)*100 || 0;
    document.getElementById("progress").style.width = percent+"%";
}

function toggleTheme(){
    document.body.classList.toggle("dark");
}

function handleEnter(e){
    if(e.key==="Enter") addTask();
}

// EXPORT
function exportTasks(){
    let data = JSON.stringify(tasks);
    let blob = new Blob([data],{type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download="tasks.json";
    a.click();
}

// IMPORT
function importTasks(e){
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload=function(){
        tasks = JSON.parse(reader.result);
        save();
        renderTasks();
    }

    reader.readAsText(file);
}

renderTasks();
</script>

</body>
</html>
